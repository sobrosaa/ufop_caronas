<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — UFOP Caronas</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <div class="page">
    <div class="container">
      <div class="page-header">
        <div>
          <h1 class="page-title">🛡️ Painel Administrativo</h1>
          <p class="page-subtitle">Relatórios e estatísticas da plataforma</p>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-grid" id="statsAdmin">
        <div class="spinner"></div>
      </div>

      <!-- Status das caronas -->
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem;">
        <div class="card">
          <div class="card-header">
            <h3 style="font-size: 1rem; font-weight: 700; color: var(--verde);">📊 Status das Caronas</h3>
          </div>
          <div class="card-body" id="statusCaronas"></div>
        </div>
        <div class="card">
          <div class="card-header">
            <h3 style="font-size: 1rem; font-weight: 700; color: var(--verde);">🗺️ Rotas Mais Usadas</h3>
          </div>
          <div class="card-body" id="rotasMaisUsadas">
            <div class="spinner"></div>
          </div>
        </div>
      </div>

      <!-- Usuários -->
      <div class="card">
        <div class="card-header">
          <h3 style="font-size: 1rem; font-weight: 700; color: var(--verde);">👥 Usuários Cadastrados</h3>
        </div>
        <div class="card-body" style="padding: 0;">
          <div id="tabelaUsuarios"><div class="spinner" style="margin: 2rem auto;"></div></div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="../js/app.js"></script>
  <script>
    requireAdmin();
    renderNavbar('admin');

    async function loadAdmin() {
      const [rel, rotas, usuarios] = await Promise.all([
        apiFetch('/api/admin/relatorios'),
        apiFetch('/api/admin/rotas'),
        apiFetch('/api/admin/usuarios'),
      ]);

      // Stats
      document.getElementById('statsAdmin').innerHTML = `
        <div class="stat-card"><span class="stat-icon">👥</span><div class="stat-value">${rel.total_usuarios}</div><div class="stat-label">Usuários</div></div>
        <div class="stat-card"><span class="stat-icon">🚗</span><div class="stat-value">${rel.total_caronas}</div><div class="stat-label">Total Caronas</div></div>
        <div class="stat-card"><span class="stat-icon">🎫</span><div class="stat-value">${rel.total_reservas}</div><div class="stat-label">Reservas</div></div>
        <div class="stat-card"><span class="stat-icon">✅</span><div class="stat-value">${rel.caronas_ativas}</div><div class="stat-label">Caronas Ativas</div></div>
      `;

      // Status caronas
      const total = rel.total_caronas || 1;
      document.getElementById('statusCaronas').innerHTML = `
        ${renderBar('Ativas', rel.caronas_ativas, total, '#065F46', '#D1FAE5')}
        ${renderBar('Concluídas', rel.caronas_concluidas, total, '#3730A3', '#E0E7FF')}
        ${renderBar('Canceladas', rel.caronas_canceladas, total, '#991B1B', '#FEE2E2')}
      `;

      // Rotas
      if (!rotas.length) {
        document.getElementById('rotasMaisUsadas').innerHTML = '<p style="color: var(--texto-suave); font-size: 0.9rem;">Nenhum dado disponível.</p>';
      } else {
        document.getElementById('rotasMaisUsadas').innerHTML = rotas.slice(0, 8).map((r, i) => `
          <div style="display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--borda); font-size: 0.88rem;">
            <div>
              <span style="color: var(--ouro); font-weight: 700; margin-right: 6px;">${i+1}.</span>
              <strong>${r.origem}</strong> → <strong>${r.destino}</strong>
            </div>
            <span class="vagas-badge vagas-ok" style="font-size: 0.76rem;">${r.total} viagens</span>
          </div>`).join('');
      }

      // Tabela usuários
      document.getElementById('tabelaUsuarios').innerHTML = `
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Usuário</th>
                <th>E-mail</th>
                <th>Cidade</th>
                <th>Curso</th>
                <th>Caronas</th>
                <th>Reservas</th>
                <th>Cadastro</th>
              </tr>
            </thead>
            <tbody>
              ${usuarios.map(u => `
                <tr>
                  <td><div style="display: flex; align-items: center; gap: 8px;">
                    <div class="avatar" style="width:32px;height:32px;font-size:0.8rem;">${u.nome.charAt(0)}</div>
                    <strong>${u.nome}</strong>
                  </div></td>
                  <td style="color: var(--texto-suave);">${u.email}</td>
                  <td>${u.cidade_base}</td>
                  <td style="color: var(--texto-suave); font-size: 0.85rem;">${u.curso || '—'}</td>
                  <td><span class="vagas-badge vagas-ok">${u.caronas_oferecidas}</span></td>
                  <td><span class="vagas-badge" style="background: #E0E7FF; color: #3730A3;">${u.reservas_feitas}</span></td>
                  <td style="color: var(--texto-suave); font-size: 0.85rem;">${new Date(u.criado_em).toLocaleDateString('pt-BR')}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderBar(label, val, total, color, bg) {
      const pct = total > 0 ? Math.round((val / total) * 100) : 0;
      return `
        <div style="margin-bottom: 1rem;">
          <div style="display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 5px;">
            <span style="font-weight: 600;">${label}</span>
            <span style="color: var(--texto-suave);">${val} (${pct}%)</span>
          </div>
          <div style="background: ${bg}; border-radius: 100px; height: 8px;">
            <div style="background: ${color}; width: ${pct}%; height: 100%; border-radius: 100px; transition: width 0.5s;"></div>
          </div>
        </div>`;
    }

    loadAdmin();
  </script>
</body>
</html>
