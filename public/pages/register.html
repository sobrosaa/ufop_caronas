<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro — UFOP Caronas</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-left">
      <a href="../pages/index.html" class="navbar-brand" style="margin-bottom: 3rem;">
        <div class="navbar-logo">🚗</div>
        <span class="navbar-brand-text" style="color:white;">UFOP <span>Caronas</span></span>
      </a>
      <h1 style="font-size: 2.2rem; font-weight: 800; color: white; line-height: 1.2; margin-bottom: 1rem;">
        Faça parte da rede de caronas da UFOP.
      </h1>
      <p style="color: rgba(255,255,255,0.7); font-size: 1rem; max-width: 320px;">
        Cadastre-se gratuitamente e comece a compartilhar caronas com outros universitários hoje mesmo.
      </p>
    </div>

    <div class="auth-right">
      <div class="auth-box">
        <h2 style="font-size: 1.4rem; font-weight: 800; color: var(--verde); margin-bottom: 0.25rem;">Criar conta</h2>
        <p style="color: var(--texto-suave); font-size: 0.9rem; margin-bottom: 2rem;">Preencha os dados para se cadastrar</p>

        <form id="registerForm">
          <div class="form-group">
            <label class="form-label">Nome completo *</label>
            <input type="text" id="nome" class="form-control" placeholder="Seu nome completo" required>
          </div>
          <div class="form-group">
            <label class="form-label">E-mail *</label>
            <input type="email" id="email" class="form-control" placeholder="seu@aluno.ufop.br" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Senha *</label>
              <input type="password" id="senha" class="form-control" placeholder="Mínimo 6 caracteres" required minlength="6">
            </div>
            <div class="form-group">
              <label class="form-label">Cidade Base *</label>
              <input type="text" id="cidade_base" class="form-control" placeholder="Ex: Belo Horizonte" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Curso</label>
              <input type="text" id="curso" class="form-control" placeholder="Seu curso">
            </div>
            <div class="form-group">
              <label class="form-label">Telefone</label>
              <input type="tel" id="telefone" class="form-control" placeholder="(31) 9xxxx-xxxx">
            </div>
          </div>
          <button type="submit" class="btn btn-verde btn-full" id="btnRegister">
            Criar minha conta →
          </button>
        </form>

        <p class="text-center mt-2" style="font-size: 0.9rem; color: var(--texto-suave);">
          Já tem conta? <a href="../pages/login.html" class="link">Entrar</a>
        </p>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="../js/app.js"></script>
  <script>
    redirectIfAuth();

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btnRegister');
      btn.disabled = true; btn.textContent = 'Criando conta...';
      try {
        const res = await apiFetch('/api/auth/register', {
          method: 'POST',
          body: JSON.stringify({
            nome: document.getElementById('nome').value,
            email: document.getElementById('email').value,
            senha: document.getElementById('senha').value,
            cidade_base: document.getElementById('cidade_base').value,
            curso: document.getElementById('curso').value,
            telefone: document.getElementById('telefone').value,
          })
        });
        if (res.token) {
          localStorage.setItem('token', res.token);
          localStorage.setItem('usuario', JSON.stringify(res.usuario));
          showToast('Conta criada com sucesso! 🎉', 'success');
          setTimeout(() => window.location.href = 'dashboard.html', 1000);
        } else {
          showToast(res.erro || 'Erro ao criar conta', 'error');
          btn.disabled = false; btn.textContent = 'Criar minha conta →';
        }
      } catch { btn.disabled = false; btn.textContent = 'Criar minha conta →'; }
    });
  </script>
</body>
</html>
